name: CI

# Se ejecuta en cada PR y push a las ramas principales.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  # BD efimera del job: passwords de usar y tirar (NO son secrets, nunca tocan prod).
  CI_PG_OWNER_USER: appuser
  CI_PG_OWNER_PASSWORD: ci_owner_pass
  CI_PG_DB: appdb
  CI_FTM_APP_PASSWORD: ci_ftm_app_pass

jobs:
  # ----------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar linters
        run: pip install ruff
      - name: Ruff
        run: ruff check .
      # Si usas black para formato, descomenta:
      # - run: pip install black && black --check .

  # ----------------------------------------------------------------------------
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: ci_owner_pass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appuser -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # env.py da prioridad a DATABASE_URL sobre la url de alembic.ini.
      # Alembic corre con el owner/migrator; la migración 0003 crea el runtime ftm_app.
      DATABASE_URL: postgresql+psycopg2://appuser:ci_owner_pass@localhost:5432/appdb
      FTM_APP_DB_PASSWORD: ci_ftm_app_pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias de migracion
        run: pip install alembic sqlalchemy psycopg2-binary
      - name: Aplicar migraciones desde cero
        working-directory: bbdd_dev_setup/alembic
        run: alembic upgrade head
      - name: Comprobar drift (models.py vs migraciones)
        working-directory: bbdd_dev_setup/alembic
        # NOTA: tu baseline es SQL-first; el autogenerate solo ve TABLAS
        # (no vista/roles/grants/RLS). Hasta que models.py refleje 1:1 las
        # tablas del ftm_schema.sql, este check puede dar falsos positivos,
        # por eso arranca como NO bloqueante. Quita continue-on-error cuando
        # models.py y el SQL esten alineados.
        continue-on-error: true
        run: alembic check

  # ----------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [migrations]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: ci_owner_pass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appuser -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Runtime API/tests: non-owner user so RLS is exercised by default.
      DATABASE_URL: postgresql+psycopg2://ftm_app:ci_ftm_app_pass@localhost:5432/appdb
      MIGRATOR_DATABASE_URL: postgresql+psycopg2://appuser:ci_owner_pass@localhost:5432/appdb
      FTM_APP_DB_PASSWORD: ci_ftm_app_pass
      # Object storage privado y efimero para UC-05.
      # Credenciales desechables: solo existen durante este runner.
      MINIO_ROOT_USER: ci-minio-root
      MINIO_ROOT_PASSWORD: ci-minio-root-pass
      MINIO_APP_USER: ftm-recordings-ci-svc
      MINIO_APP_PASSWORD: ci-minio-app-pass
      MINIO_REGION_NAME: eu-local-1
      MINIO_BUCKET: ftm-recordings-ci
      MINIO_API_PORT: "9000"
      MINIO_CONSOLE_PORT: "9001"
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: ftm-recordings-ci-svc
      S3_SECRET_ACCESS_KEY: ci-minio-app-pass
      S3_BUCKET: ftm-recordings-ci
      S3_REGION: eu-local-1
      S3_FORCE_PATH_STYLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Levantar MinIO y crear bucket privado UC-05
        run: |
          set -euo pipefail
          COMPOSE_FILE="bbdd_dev_setup/ftm-recording-database/docker-compose.yml"

          docker compose -f "$COMPOSE_FILE" up -d minio

          for attempt in $(seq 1 60); do
            if docker compose -f "$COMPOSE_FILE" exec -T minio mc ready local >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              docker compose -f "$COMPOSE_FILE" logs minio
              echo "MinIO no alcanzo el estado ready" >&2
              exit 1
            fi
            sleep 2
          done

          docker compose -f "$COMPOSE_FILE" exec -T minio \
            mc alias set ci http://localhost:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
          docker compose -f "$COMPOSE_FILE" exec -T minio \
            mc mb --ignore-existing "ci/$MINIO_BUCKET"
          docker compose -f "$COMPOSE_FILE" exec -T minio \
            mc anonymous set none "ci/$MINIO_BUCKET"

          cat > /tmp/ftm-recordings-ci-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:GetBucketLocation", "s3:ListBucket"],
                "Resource": ["arn:aws:s3:::$MINIO_BUCKET"]
              },
              {
                "Effect": "Allow",
                "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
                "Resource": ["arn:aws:s3:::$MINIO_BUCKET/*"]
              }
            ]
          }
          EOF
          MINIO_CONTAINER="$(docker compose -f "$COMPOSE_FILE" ps -q minio)"
          docker cp /tmp/ftm-recordings-ci-policy.json \
            "$MINIO_CONTAINER:/tmp/ftm-recordings-ci-policy.json"
          docker compose -f "$COMPOSE_FILE" exec -T minio \
            mc admin policy create ci ftm-recordings-ci-rw /tmp/ftm-recordings-ci-policy.json
          docker compose -f "$COMPOSE_FILE" exec -T minio \
            mc admin user add ci "$MINIO_APP_USER" "$MINIO_APP_PASSWORD"
          docker compose -f "$COMPOSE_FILE" exec -T minio \
            mc admin policy attach ci ftm-recordings-ci-rw --user "$MINIO_APP_USER"
      - name: Instalar dependencias
        run: |
          pip install alembic sqlalchemy psycopg2-binary pytest httpx
          # Dependencias del backend (ajusta la ruta a tu fichero real):
          if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Preparar esquema (migraciones)
        working-directory: bbdd_dev_setup/alembic
        env:
          DATABASE_URL: ${{ env.MIGRATOR_DATABASE_URL }}
        run: alembic upgrade head
      - name: Verificar usuario runtime ftm_app
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.begin() as conn:
              assert conn.scalar(text("SELECT current_user")) == "ftm_app"
              conn.execute(text("SET LOCAL ROLE ftm_medical_specialist"))
              assert conn.scalar(text("SELECT current_user")) == "ftm_medical_specialist"
              assert conn.scalar(text("SELECT has_table_privilege(current_user, 'clinical.patient', 'SELECT')"))
          PY
      - name: Tests unitarios
        working-directory: api
        run: |
          python -m pytest tests --ignore=tests/integration -q
      - name: Test de integracion upload MinIO UC-05
        working-directory: api
        env:
          RUN_INTEGRATION: "1"
        run: python -m pytest tests/integration/test_recording_storage.py -q
      - name: Tests de integracion PostgreSQL/RLS
        working-directory: api
        env:
          RUN_INTEGRATION: "1"
        run: >-
          python -m pytest tests/integration
          --ignore=tests/integration/test_recording_storage.py -q
      - name: Logs de MinIO si falla el job
        if: failure()
        run: docker compose -f bbdd_dev_setup/ftm-recording-database/docker-compose.yml logs minio


  # ----------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      - name: Frontend typecheck
        working-directory: web
        run: npm run lint
      - name: Frontend tests
        working-directory: web
        run: npm test
      - name: Frontend build
        working-directory: web
        run: npm run build
