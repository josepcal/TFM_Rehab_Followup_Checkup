      #     # credenciales del proveedor cloud como secrets
      #     TF_VAR_image_tag: ${{ github.sha }}
      #   run: |
      #     terraform init
      #     terraform apply -auto-approve

      # --- OPCION B: SSH a tu VM + docker compose pull/up ---
      # - uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
