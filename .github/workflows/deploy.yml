name: Deploy

# Despliegue al hacer merge a main. Alternativa: disparar por tags de version.
on:
  push:
    branches: [main]
  # push:
  #   tags: ["v*"]

permissions:
  contents: read
  packages: write        # necesario para push de imagenes a GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # 1) Construir y publicar imagenes (api, worker, web)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/api:latest
      # Anade worker y web cuando existan sus Dockerfile:
      # - name: Build & push worker
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ./worker
      #     push: true
      #     tags: ${{ env.IMAGE_PREFIX }}/worker:${{ github.sha }}

  # ----------------------------------------------------------------------------
  # 2) Migrar la BD REAL antes de desplegar el codigo nuevo
  migrate:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production      # gating manual + secrets de entorno
    env:
      # Secret con la cadena completa, p.ej.:
      # postgresql+psycopg2://USER:PASS@HOST:5432/appdb
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install alembic sqlalchemy psycopg2-binary
      - name: alembic upgrade head (BD de produccion)
        working-directory: bbdd_dev_setup/alembic
        run: alembic upgrade head

  # ----------------------------------------------------------------------------
  # 3) Desplegar (rellena con TU mecanismo real)
  deploy:
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      # --- OPCION A: Terraform (ya tienes carpeta terraform/) ---
