services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ftm-recording-minio
    command: server /data --console-address ":9001"
    environment:
      # Solo desarrollo local. Cambiar en cualquier entorno compartido.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_REGION_NAME: ${MINIO_REGION_NAME:-eu-local-1}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Consola web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: ftm-recording-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-ftm-recordings}
    entrypoint: >
      /bin/sh -c "
      mc alias set ftm http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\";
      mc mb --ignore-existing ftm/\"$${MINIO_BUCKET}\";
      mc anonymous set none ftm/\"$${MINIO_BUCKET}\";
      mc version enable ftm/\"$${MINIO_BUCKET}\";
      echo \"MinIO bucket ready: $${MINIO_BUCKET}\";
      "
    restart: "no"

volumes:
  minio_data:
